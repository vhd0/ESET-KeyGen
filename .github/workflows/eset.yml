name: Generator

on:
  workflow_dispatch:
    inputs:
      account:
        description: 'Number of Accounts to be generated (default = 0)'
        required: false
        default: '0'
      key:
        description: 'Number of Keys to be generated (default = 1)'
        required: false
        default: '1'
      mail:
        description: 'Choose the mail provider to generate license'
        required: true
        type: choice
        options:
        - 1secmail
        - guerrillamail
        - developermail
        - mailticking
        - fakemail
        - inboxes
        - incognitomail
        - emailfake
        default: emailfake
      key_type:
        description: 'Modes of operation'
        required: true
        type: choice
        options:
        - --key
        - --small-business-key
        default: --key
      os:
        description: 'Operating System of runner'
        required: true
        type: choice
        options:
        - macOS
        - Linux
        - Windows
        default: macOS
      branch:
        description: "Repository branch (don't touch it if you don't know what it is!!!)"
        required: false
        type: choice
        options:
        - main
        - test
        default: main

jobs:
  generator:
    runs-on: ubuntu-latest # Using Ubuntu for the main logic and randomization
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment and run generation loop
        id: generate
        run: |
          # Define inputs for randomization
          OS_OPTIONS=("Linux" "macOS" "Windows")
          MAIL_OPTIONS=("1secmail" "guerrillamail" "developermail" "mailticking" "fakemail" "inboxes" "incognitomail" "emailfake")
          KEY_TYPE_OPTIONS=("--key" "--small-business-key")
          REPO_URL="https://github.com/rzc0d3r/ESET-KeyGen.git"
          BRANCH=${{ github.event.inputs.branch }}

          # Initialize output file (Markdown table header)
          echo "| Key Type | Key | Username | Password | Expires Date |" > output.md
          echo "| :--- | :--- | :--- | :--- | :--- |" >> output.md
          
          # Initialize variables for loop control
          SUCCESS=0
          
          # Iterate through combinations and attempt to generate a key
          for os in "${OS_OPTIONS[@]}"; do
            if [ $SUCCESS -eq 1 ]; then
              break
            fi
            
            for key_type in "${KEY_TYPE_OPTIONS[@]}"; do
              if [ $SUCCESS -eq 1 ]; then
                break
              fi

              for mail in "${MAIL_OPTIONS[@]}"; do
                if [ $SUCCESS -eq 1 ]; then
                  break
                fi
                
                echo "Attempting generation with OS: $os, Mail: $mail, Key Type: $key_type"
                
                # --- Setup and Run Logic based on OS ---
                # NOTE: This block simplifies the previous Linux/macOS/Windows job logic into a single step for sequential randomization.

                CLONE_DIR="ESET-KeyGen"
                
                # Clone the repository
                if [ -d "$CLONE_DIR" ]; then
                  rm -rf "$CLONE_DIR"
                fi
                git clone -b $BRANCH $REPO_URL $CLONE_DIR
                cd $CLONE_DIR

                # Setup Python environment
                python3 -m venv venv
                source venv/bin/activate
                pip install -r requirements.txt

                # Run the generation script for key (using input defaults if needed)
                python3 main.py --auto-detect-browser $key_type --email-api $mail --skip-update-check --no-logo --disable-progress-bar --disable-logging --repeat ${{ github.event.inputs.key }} > generation_log.txt 2>&1

                # Check if KEYS.txt was created and has content (indicating success)
                if [ -s ./*KEYS.txt ]; then
                  echo "Successfully generated key!"
                  # Read the generated key details and format them for the markdown table
                  # Note: ESET-KeyGen often outputs the key details in a specific format to a file. 
                  # We assume the KEYS.txt contains the necessary information for the table fields or a single key/account line.
                  
                  # This section needs to parse the generated output. 
                  # Since we don't know the exact format of *KEYS.txt, we assume a simple capture for demonstration.
                  
                  # If *KEYS.txt contains: Key, Username, Password, Expires Date (separated by tabs/spaces or on one line)
                  KEY_DATA=$(cat ./*KEYS.txt)
                  
                  # Append to output.md
                  echo "| $key_type | $KEY_DATA |" >> ../output.md
                  
                  SUCCESS=1
                  break 3 # Exit all loops
                fi
                
                # Cleanup if generation failed for this iteration
                cd ..
                rm -rf $CLONE_DIR
              done
            done
          done

          # Check final status
          if [ $SUCCESS -eq 0 ]; then
            echo "Error: Failed to generate a key after trying all combinations."
            exit 1
          fi

      - name: Upload output file to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-keys
          path: output.md
