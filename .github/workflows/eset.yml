name: ESET Random Generator

on:
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git

      - name: Clone ESET-KeyGen and setup virtualenv
        run: |
          git clone https://github.com/rzc0d3r/ESET-KeyGen.git
          cd ESET-KeyGen
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          cd ..

      - name: Run key generation with randomized combinations
        run: |
          cat << 'EOF' > generate_keys.py
          import random
          import subprocess
          import os
          from itertools import product

          os_list = ["Windows", "macOS", "Linux"]
          mail_list = ["1secmail", "guerrillamail", "developermail", "mailticking", "fakemail", "inboxes", "incognitomail", "emailfake"]
          key_types = ["--key", "--small-business-key"]

          combinations = list(product(os_list, mail_list, key_types))
          random.shuffle(combinations)

          success = False
          key_data = {}

          for os_name, mail, key_type in combinations:
              print(f"🔁 Trying: OS={os_name}, Mail={mail}, Type={key_type}")
              try:
                  cmd = [
                      "bash", "-c",
                      f"""
                      cd ESET-KeyGen && \
                      source venv/bin/activate && \
                      python3 main.py {key_type} --email-api {mail} --auto-detect-browser --skip-update-check --no-logo --disable-progress-bar --disable-logging --repeat 1
                      """
                  ]
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=180)
                  print(result.stdout)
                  print(result.stderr)
                  if result.returncode == 0:
                      files = os.listdir("ESET-KeyGen")
                      key_file = next((f for f in files if f.endswith("KEYS.txt")), None)
                      if key_file:
                          with open(f"ESET-KeyGen/{key_file}") as f:
                              lines = f.readlines()
                              for line in lines:
                                  parts = line.strip().split("|")
                                  if len(parts) >= 4:
                                      key_data = {
                                          "key": parts[0].strip(),
                                          "username": parts[1].strip(),
                                          "password": parts[2].strip(),
                                          "expires": parts[3].strip(),
                                          "key_type": key_type
                                      }
                                      success = True
                                      break
              except Exception as e:
                  print(f"❌ Error: {e}")
                  continue

              if success:
                  break

          if not success:
              print("❌ All combinations failed.")
              exit(1)

          print("📝 Writing to eset_keys.md")
          with open("eset_keys.md", "w") as f:
              f.write("# ✅ ESET License Key\\n\\n")
              f.write("| key | username | password | expires date | key type |\\n")
              f.write("|-----|----------|----------|---------------|-----------|\\n")
              f.write(f"| `{key_data['key']}` | `{key_data['username']}` | `{key_data['password']}` | {key_data['expires']} | {key_data['key_type']} |\\n")
          EOF

          python3 generate_keys.py

      - name: Commit and push eset_keys.md
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add eset_keys.md
          git commit -m "🔐 Add new ESET key"
          git push
