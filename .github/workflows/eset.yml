name: Generator

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Repository branch to commit the key to (e.g., main)"
        required: true
        default: 'main'

jobs:
  generate:
    runs-on: ${{ matrix.os }}
    # Tiếp tục chạy các job khác trong matrix ngay cả khi một job bị lỗi
    continue-on-error: true
    strategy:
      # Chạy tất cả các job trong matrix, không hủy các job khác nếu một job lỗi
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        mail_api: [1secmail, guerrillamail, developermail, mailticking, fakemail, inboxes, incognitomail, emailfake]
        key_type: [--key, --small-business-key]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone ESET-KeyGen Repository
        run: git clone https://github.com/rzc0d3r/ESET-KeyGen.git

      - name: Setup Python Environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv ESET-KeyGen/venv
          source ESET-KeyGen/venv/bin/activate
          pip install -r ESET-KeyGen/requirements.txt
        
      - name: Setup Python Environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python
          python3 -m venv ESET-KeyGen/venv
          source ESET-KeyGen/venv/bin/activate
          pip install -r ESET-KeyGen/requirements.txt

      - name: Setup Python Environment (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install -r ESET-KeyGen/requirements.txt

      - name: Attempt to Generate Key
        id: generate_key
        run: |
          cd ESET-KeyGen
          
          # Activate venv for Linux/macOS
          if [ -f "venv/bin/activate" ]; then
            source venv/bin/activate
          fi
          
          # Run the generator and save output
          python main.py --auto-detect-browser ${{ matrix.key_type }} --email-api ${{ matrix.mail_api }} --skip-update-check --no-logo --disable-progress-bar --disable-logging --repeat 1
          
          # Check if key file was created and is not empty
          KEY_FILE=$(ls ./*KEYS.txt 2>/dev/null | head -n 1)
          if [ -n "$KEY_FILE" ] && [ -s "$KEY_FILE" ]; then
            echo "SUCCESS: Key generated successfully."
            echo "key_generated=true" >> $GITHUB_OUTPUT
            # Prepare result for upload
            KEY_CONTENT=$(cat "$KEY_FILE")
            echo "key_content<<EOF" >> $GITHUB_OUTPUT
            echo "$KEY_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "FAILURE: Could not generate key with this combination."
            echo "key_generated=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload successful key
        if: steps.generate_key.outputs.key_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: key-data-${{ matrix.os }}-${{ matrix.mail_api }}-${{ matrix.key_type }}
          path: |
            ESET-KeyGen/*KEYS.txt
            
  summarize:
    runs-on: ubuntu-latest
    needs: generate
    # Luôn chạy job này để xử lý kết quả, dù job 'generate' thành công hay thất bại
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Process Results and Generate Markdown
        id: process
        run: |
          # Tìm file KEYS.txt đầu tiên trong tất cả các artifact đã tải xuống
          KEY_FILE=$(find artifacts -name "*KEYS.txt" -type f | head -n 1)

          if [ -z "$KEY_FILE" ]; then
            echo "::error::Failed to generate any key after trying all combinations."
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "SUCCESS: Found a generated key."
          echo "status=success" >> $GITHUB_OUTPUT

          # Trích xuất thông tin từ tên thư mục artifact
          # Ví dụ tên thư mục: key-data-ubuntu-latest-1secmail---key
          ARTIFACT_DIR=$(dirname "$KEY_FILE")
          DIR_NAME=$(basename "$ARTIFACT_DIR")
          KEY_TYPE=$(echo "$DIR_NAME" | awk -F'-' '{print $NF}')

          # Đọc nội dung key từ file (giả sử định dạng là: Key: ... | Password: ... | Expires: ...)
          CONTENT=$(cat "$KEY_FILE")
          KEY=$(echo "$CONTENT" | sed -n 's/.*Key: \([^|]*\).*/\1/p' | xargs)
          PASS=$(echo "$CONTENT" | sed -n 's/.*Password: \([^|]*\).*/\1/p' | xargs)
          EXPIRES=$(echo "$CONTENT" | sed -n 's/.*Expires: \([^|]*\).*/\1/p' | xargs)
          USER="N/A" # Script không cung cấp username, nên ta để mặc định

          # Tạo file markdown
          MD_FILE="GENERATED_KEY.md"
          echo "| Key Type | Key | Username | Password | Expires Date |" > $MD_FILE
          echo "|---|---|---|---|---|" >> $MD_FILE
          echo "| \`${KEY_TYPE}\` | \`${KEY}\` | ${USER} | \`${PASS}\` | ${EXPIRES} |" >> $MD_FILE

          echo "Markdown file '$MD_FILE' created:"
          cat $MD_FILE

      - name: Commit and Push Markdown File
        if: steps.process.outputs.status == 'success'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add GENERATED_KEY.md
          # Chỉ commit nếu có thay đổi
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "feat: Add generated ESET key"
            git push origin ${{ github.event.inputs.branch }}
          fi
          
      - name: Report Failure
        if: steps.process.outputs.status == 'failure'
        run: |
          echo "Workflow failed because no key could be generated."
          exit 1
