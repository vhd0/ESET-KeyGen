name: Automated ESET Key Generator (Simplified)

on:
  push:
    branches:
      - main

jobs:
  generate_key_attempts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Cho phép tất cả các kết hợp chạy, ngay cả khi một số thất bại
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        mail: [1secmail, guerrillamail, developermail, mailticking, fakemail, inboxes, incognitomail, emailfake]
        key_type: [--key, --small-business-key]
        key_count: [1] # Luôn cố gắng tạo 1 khóa cho mỗi lần thử
        account_count: [0] # Không tạo tài khoản trong các lần thử này

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone ESET-KeyGen repository
        run: git clone https://github.com/rzc0d3r/ESET-KeyGen.git
        working-directory: ${{ github.workspace }} # Đảm bảo clone vào thư mục gốc của workspace

      - name: Setup Python environment
        shell: bash # Sử dụng bash cho các lệnh shell nhất quán trên các hệ điều hành
        run: |
          # Cài đặt các dependency Python tùy thuộc vào hệ điều hành của runner
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            sudo apt update
            sudo apt install -y python3-pip python3-venv
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            brew install python
          fi

          python3 -m venv venv
          # Kích hoạt venv
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            source venv/Scripts/activate # Dành cho Git Bash trên Windows runners
          else
            source venv/bin/activate
          fi
          
          python3 -m pip install --upgrade pip # Nâng cấp pip để thực hành tốt
          pip install -r requirements.txt
        working-directory: ${{ github.workspace }}/ESET-KeyGen # Thực thi trực tiếp trong repo đã clone

      - name: Attempt key generation (${{ matrix.os }} / ${{ matrix.mail }} / ${{ matrix.key_type }})
        id: generate_key_attempt
        shell: bash # Sử dụng bash cho các lệnh shell nhất quán trên các hệ điều hành
        run: |
          # Kích hoạt venv trước khi chạy script
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            source venv/Scripts/activate # Dành cho Git Bash trên Windows runners
          else
            source venv/bin/activate
          fi
          python3 main.py --auto-detect-browser ${{ matrix.key_type }} --email-api ${{ matrix.mail }} --skip-update-check --no-logo --disable-progress-bar --disable-logging --repeat ${{ matrix.key_count }}
        working-directory: ${{ github.workspace }}/ESET-KeyGen # Thực thi trực tiếp trong repo đã clone
        continue-on-error: true # Cho phép bước này thất bại mà không dừng job con của matrix

      - name: Check for generated key and save to temporary file
        id: save_key_temp
        shell: bash # Sử dụng bash để xử lý chuỗi đa nền tảng
        run: |
          # REPO_DIR hiện là thư mục làm việc hiện tại
          KEY_FILE=$(find . -name "*KEYS.txt" -print -quit)
          ACCOUNT_FILE=$(find . -name "*ACCOUNTS.txt" -print -quit) # Có thể không tồn tại nếu không tạo account
          KEY_DETAILS=""
          KEY_FOUND="false"

          if [ -f "$KEY_FILE" ] && grep -q "Key:" "$KEY_FILE"; then
            echo "Key found in this combination! Saving to temporary file."
            KEY_FOUND="true"

            # Trích xuất Key và Expires Date
            KEY_LINE=$(grep "Key:" "$KEY_FILE" | head -n 1)
            KEY=$(echo "$KEY_LINE" | sed -E 's/.*Key: ([^|]+).*/\1/' | xargs)
            EXPIRES_DATE=$(echo "$KEY_LINE" | sed -E 's/.*Expires: (.*)/\1/' | xargs)

            USERNAME=""
            PASSWORD=""
            # Trích xuất Username và Password nếu có file ACCOUNTS.txt
            if [ -f "$ACCOUNT_FILE" ] && grep -q "Username:" "$ACCOUNT_FILE"; then
              ACCOUNT_LINE=$(grep "Username:" "$ACCOUNT_FILE" | head -n 1)
              USERNAME=$(echo "$ACCOUNT_LINE" | sed -E 's/.*Username: ([^|]+).*/\1/' | xargs)
              PASSWORD=$(echo "$ACCOUNT_LINE" | sed -E 's/.*Password: (.*)/\1/' | xargs)
            fi

            # Định dạng cho hàng bảng markdown
            # Sử dụng matrix.key_type để đảm bảo đúng loại khóa được ghi
            KEY_DETAILS="| ${{ matrix.key_type }} | $KEY | $USERNAME | $PASSWORD | $EXPIRES_DATE |"
            
            # Ghi chi tiết khóa vào một tệp tạm thời duy nhất trong thư mục gốc của workspace
            echo "$KEY_DETAILS" > "${{ github.workspace }}/found_key_${{ matrix.os }}_${{ matrix.mail }}_${{ matrix.key_type }}.txt"
            echo "key_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No key found for this combination."
            echo "key_found=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}/ESET-KeyGen # Thực thi trong repo đã clone

  finalize_output:
    needs: generate_key_attempts # Đảm bảo tất cả các lần thử tạo khóa đã hoàn tất
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Cần thiết để push thay đổi

      - name: Collect and write key to Markdown
        id: write_final_markdown
        shell: bash
        run: |
          MARKDOWN_FILE="generated_keys.md"
          FOUND_KEY_FILE=""
          KEY_DETAILS_LINE=""

          # Tìm tệp khóa thành công đầu tiên
          # Lặp qua các tệp tạm thời có thể được tạo bởi các job matrix
          for key_file in ${{ github.workspace }}/found_key_*.txt; do
            if [ -f "$key_file" ]; then
              FOUND_KEY_FILE="$key_file"
              KEY_DETAILS_LINE=$(cat "$key_file")
              echo "Found key in $key_file"
              break # Lấy cái đầu tiên tìm thấy
            fi
          done

          if [ -n "$FOUND_KEY_FILE" ]; then
            # Tạo tệp markdown với tiêu đề nếu nó không tồn tại hoặc trống
            if [ ! -f "$MARKDOWN_FILE" ] || [ ! -s "$MARKDOWN_FILE" ]; then
              echo "# Generated ESET Keys" > "$MARKDOWN_FILE"
              echo "" >> "$MARKDOWN_FILE"
              echo "| Key Type | Key | Username | Password | Expires Date |" >> "$MARKDOWN_FILE"
              echo "|----------|-----|----------|----------|--------------|" >> "$MARKDOWN_FILE"
            fi

            # Thêm chi tiết khóa
            echo "$KEY_DETAILS_LINE" >> "$MARKDOWN_FILE"
            echo "Key successfully added to $MARKDOWN_FILE"

            # Commit và push tệp markdown đã cập nhật
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$MARKDOWN_FILE"
            git commit -m "Add generated ESET key" || echo "No new key to commit"
            git push
            echo "key_written=true" >> "$GITHUB_OUTPUT"
          else
            echo "No key found across all attempts."
            echo "key_written=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }} # Thực thi từ thư mục gốc của repository

      - name: Fail workflow if no key was written
        if: steps.write_final_markdown.outputs.key_written == 'false'
        run: |
          echo "Error: No key could be generated after trying all combinations."
          exit 1
